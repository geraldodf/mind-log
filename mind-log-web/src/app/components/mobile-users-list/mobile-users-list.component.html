<div class="flex flex-col gap-3 p-3">
  @for (user of users; track user.id) {
    <div class="glass-card p-4">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="text-sm font-semibold text-slate-300 truncate">{{ user.name }}</div>
          <div class="text-xs text-slate-500 truncate">&#64;{{ user.username }}</div>
          <div class="text-xs text-slate-500 truncate mt-1">{{ user.email }}</div>
        </div>
        <span class="badge-success" *ngIf="user.isEnabled">{{ 'users.active' | translate }}</span>
        <span class="badge-secondary" *ngIf="!user.isEnabled">{{ 'users.disabled' | translate }}</span>
      </div>

      <div class="flex flex-wrap gap-1 mt-3">
        <span class="badge-secondary" *ngFor="let role of user.roles">
          {{ roleLabels[role.authority] }}
        </span>
      </div>

      <button class="mt-3 w-full btn-outline-ios justify-center" (click)="toggleEnabled.emit(user)">
        <i class="fa-solid text-xs" [ngClass]="user.isEnabled ? 'fa-user-slash' : 'fa-user-check'"></i>
        {{ user.isEnabled ? ('users.disable' | translate) : ('users.enable' | translate) }}
      </button>
    </div>
  }
</div>
