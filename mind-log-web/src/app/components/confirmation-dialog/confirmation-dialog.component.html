<div class="modal-header">
  <h4 class="modal-title">Confirme para continuar</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
</div>
<div class="modal-body">
  <div class="flex items-start gap-3 p-4 rounded-2xl bg-amber-500/8 border border-amber-500/15">
    <div class="w-9 h-9 rounded-xl bg-amber-500/15 flex items-center justify-center flex-shrink-0 mt-0.5">
      <i class="fa-solid fa-triangle-exclamation text-amber-400 text-sm"></i>
    </div>
    <div>
      <p class="text-sm font-medium text-slate-200 mb-0.5">Tem certeza?</p>
      <p class="text-sm text-slate-400 mb-0">Você tem certeza que deseja continuar? Esta ação não pode ser desfeita.</p>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn-ghost-ios" (click)="onCancel()">Cancelar</button>
  <button type="button" class="btn-primary-ios" (click)="onConfirm()">Confirmar</button>
</div>
