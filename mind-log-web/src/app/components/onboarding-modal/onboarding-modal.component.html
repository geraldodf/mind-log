<div class="modal-body p-0">

  <!-- Step content -->
  <div class="flex flex-col items-center text-center px-8 pt-10 pb-6 gap-5">

    <!-- Icon -->
    <div class="w-20 h-20 rounded-2xl flex items-center justify-center flex-shrink-0"
         [ngClass]="current.iconBg">
      <i class="text-3xl" [ngClass]="[current.icon, current.iconColor]"></i>
    </div>

    <!-- Text -->
    <div class="flex flex-col gap-2 max-w-sm">
      <h4 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-0">
        {{ current.title }}
      </h4>
      <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-0">
        {{ current.description }}
      </p>
      <p class="text-sm text-slate-400 dark:text-slate-500 mb-0">
        {{ current.detail }}
      </p>
    </div>

    <!-- Step dots -->
    <div class="flex items-center gap-2 mt-1">
      @for (step of steps; track $index) {
        <button
          class="rounded-full transition-all duration-200"
          [class]="$index === currentStep
            ? 'w-6 h-2 bg-indigo-500'
            : 'w-2 h-2 bg-slate-300 dark:bg-slate-600 hover:bg-slate-400'"
          (click)="currentStep = $index">
        </button>
      }
    </div>

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between px-8 py-5 border-t border-slate-200/80 dark:border-white/[0.06]">

    <button class="btn-ghost-ios text-sm" (click)="skip()">
      Pular introdução
    </button>

    <div class="flex items-center gap-2">
      @if (!isFirst) {
        <button class="btn-ghost-ios" (click)="prev()">
          <i class="fa-solid fa-arrow-left text-xs mr-1.5"></i> Anterior
        </button>
      }
      @if (!isLast) {
        <button class="btn-primary-ios" (click)="next()">
          Próximo <i class="fa-solid fa-arrow-right text-xs ml-1.5"></i>
        </button>
      } @else {
        <button class="btn-primary-ios" (click)="finish()" routerLink="/media/new">
          Adicionar mídia <i class="fa-solid fa-rocket text-xs ml-1.5"></i>
        </button>
      }
    </div>

  </div>

</div>
