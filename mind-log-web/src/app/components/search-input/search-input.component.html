<div class="relative w-full">
  <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none"></i>
  <input
    type="text"
    class="ios-input w-full pl-9 pr-9"
    placeholder="Buscar por descrição..."
    [formControl]="control"
  />
  @if (control.value) {
    <button
      type="button"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors"
      (click)="clear()">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  }
</div>
