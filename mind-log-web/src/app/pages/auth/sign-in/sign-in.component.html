<div class="min-h-screen flex items-center justify-center bg-[#060A14] relative overflow-hidden px-4">

  <!-- Background ambient orbs -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-[-20%] left-[10%] w-[600px] h-[600px] rounded-full opacity-10"
         style="background: radial-gradient(circle, #6366f1 0%, transparent 70%); filter: blur(80px);"></div>
    <div class="absolute bottom-[-20%] right-[5%] w-[500px] h-[500px] rounded-full opacity-8"
         style="background: radial-gradient(circle, #4338ca 0%, transparent 70%); filter: blur(100px);"></div>
    <div class="absolute top-[40%] right-[20%] w-[300px] h-[300px] rounded-full opacity-5"
         style="background: radial-gradient(circle, #818cf8 0%, transparent 70%); filter: blur(60px);"></div>
  </div>

  <div class="w-full max-w-sm relative z-10 animate-slide-up">

    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 shadow-glow-indigo mb-4">
        <i class="fa-solid fa-money-bill-transfer text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-100 mb-1">Mind Log</h1>
      <p class="text-sm text-slate-500">Faça login para trackear seus progressos</p>
    </div>

    <!-- Card -->
    <div style="background: rgba(13,19,32,0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);"
         class="border border-white/[0.08] rounded-3xl p-8 shadow-modal">

      <!-- Error Alert -->
      <div *ngIf="invalidLogin"
           class="flex items-center gap-3 p-3 rounded-xl bg-red-500/10 border border-red-500/20 mb-5">
        <i class="fa-solid fa-circle-exclamation text-red-400 flex-shrink-0 text-sm"></i>
        <span class="text-sm text-red-400">Usuário ou senha incorretos.</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Username -->
        <div class="mb-4">
          <label class="ios-label">Usuário</label>
          <div class="ios-input-group"
               [ngClass]="form.controls.username.touched && form.controls.username.invalid ? 'is-invalid' : ''">
            <span class="ios-input-group-text">
              <i class="fa-regular fa-user text-xs"></i>
            </span>
            <input type="text"
                   placeholder="Seu usuário"
                   formControlName="username"
                   required
                   autocomplete="username">
          </div>
          <div class="invalid-feedback" *ngIf="form.controls.username.touched && form.controls.username.invalid">
            Por favor, insira seu usuário.
          </div>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-2">
            <label class="ios-label mb-0">Senha</label>
            <a routerLink="" class="text-xs font-medium text-indigo-400 hover:text-indigo-300 transition-colors no-underline">
              Esqueceu a senha?
            </a>
          </div>
          <div class="ios-input-group"
               [ngClass]="form.controls.password.touched && form.controls.password.invalid ? 'is-invalid' : ''">
            <span class="ios-input-group-text">
              <i class="fa-regular fa-lock text-xs"></i>
            </span>
            <input [type]="isPasswordVisible ? 'text' : 'password'"
                   placeholder="Sua senha"
                   formControlName="password"
                   required
                   autocomplete="current-password">
            <button type="button"
                    (click)="setIsPasswordVisible()"
                    title="Alternar visibilidade">
              <i class="fa-regular text-xs"
                 [ngClass]="isPasswordVisible ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
          <div class="invalid-feedback" *ngIf="form.controls.password.touched && form.controls.password.invalid">
            Por favor, insira sua senha.
          </div>
        </div>

        <button type="submit"
                class="w-full btn-primary-ios justify-center py-3 text-sm font-semibold rounded-xl"
                [disabled]="form.invalid">
          Entrar
        </button>

        <p class="text-center text-sm text-slate-500 mt-5 mb-0">
          Não tem uma conta?
          <a routerLink="/auth/sign-up" class="font-semibold text-indigo-400 hover:text-indigo-300 transition-colors no-underline ml-1">Cadastre-se</a>
        </p>
      </form>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">
      &copy; 2026 MindLog. Todos os direitos reservados.
    </p>
  </div>
</div>
