<div class="flex flex-col min-h-screen bg-slate-100 dark:bg-[#060A14]">

  @if (isAuthenticated) {
    <app-topnav
      [username]="username"
      (signOutEmitter)="signOut()">
    </app-topnav>
  }

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6 py-6 sm:py-8">
      <router-outlet></router-outlet>
    </div>
  </main>

  <ngx-ui-loader></ngx-ui-loader>
</div>
