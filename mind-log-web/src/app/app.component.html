<div class="flex min-h-screen bg-slate-100 dark:bg-[#060A14] overflow-hidden relative">

  @if (isAuthenticated) {
    <app-sidebar
      [username]="username"
      [isMobileOpen]="isMobileNavOpen"
      [class.sidebar-mobile-open]="isMobileNavOpen"
      (closeMobileNavEmitter)="closeMobileNav()"
      (signOutEmitter)="signOut()">
    </app-sidebar>
  }

  @if (isAuthenticated && isMobileNavOpen) {
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm lg:hidden z-40" (click)="closeMobileNav()"></div>
  }

  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
    <div class="lg:hidden sticky top-0 z-30 px-4 py-3 flex items-center gap-3 bg-slate-100/95 dark:bg-[#060A14]/95 backdrop-blur border-b border-slate-200/70 dark:border-white/[0.06]">
      <button type="button" class="btn-icon-ios rounded-xl w-10 h-10" (click)="toggleMobileNav()">
        <i class="fa-solid fa-bars text-sm"></i>
      </button>
      <div class="flex flex-col">
        <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Mind Log</span>
        <span class="text-xs text-slate-500 dark:text-slate-400">{{ username }}</span>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 sm:px-6 py-6 sm:py-8">
      <div class="max-w-[1440px] mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>

  <ngx-ui-loader></ngx-ui-loader>
</div>
