spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/mind_log
spring.datasource.username=${DEV_DB_USER:postgres}
spring.datasource.password=${DEV_DB_PASSWORD:password}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.accessToken.secret=dev-access-token-secret
spring.security.refreshToken.secret=dev-refresh-token-secret
security.jwt.duration.access=3600
security.jwt.duration.refresh=90

spring.security.cors.origins=http://localhost:4200

security.password.recover.token.minutes=30
security.password.recover.token.uri=http://localhost:4200/auth/reset-password

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
security.oauth2.success-redirect-uri=http://localhost:4200/auth/callback
